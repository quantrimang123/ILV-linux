name: Build ILV-Linux ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged --device=/dev/loop-control --device=/dev/loop0 --cap-add=SYS_ADMIN --cap-add=SYS_CHROOT
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ hashFiles('configs/releng/pacman.conf') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-pacman-${{ hashFiles('configs/releng/pacman.conf') }}-

      - name: Install dependencies and init keyring
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm archlinux-keyring aria2 archiso squashfs-tools dosfstools mtools base-devel reflector jq git github-cli curl bc wget unzip rsync
          pacman -S --noconfirm ncurses libelf perl texinfo glibc
          pacman -Syu --noconfirm
          packages=(git gcc base-devel bc bison bzip2 tar flex pahole libelf elfutils openssl zstd kmod cpio gawk  llvm clang lld ccache patch curl pigz xz lz4 linux-headers glibc gcc-libs zlib perl python python-pip findutils grep sed coreutils util-linux linux-firmware procps-ng iproute2 dracut)
          for pkg in "${packages[@]}"; do pacman -S --noconfirm "$pkg"; done
          pacman-key --init || true
          pacman-key --populate archlinux || true
          reflector --latest 10 --protocol https --sort rate --save /etc/pacman.d/mirrorlist
          mkdir -p /opt/gcc-13
          curl -L https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--bleeding-edge-2023.08-1.tar.bz2 | tar -xjC /opt/gcc-13 --strip-components=1
          echo "/opt/gcc-13/bin" >> $GITHUB_PATH
          export PATH="/opt/gcc-13/bin:$PATH"
          cd ..
      - name: Setup and Build
        run: |
          mkdir -p buildroot
          echo "Downloading Buildroot..."
          curl -O https://buildroot.org/downloads/buildroot-2026.02.tar.gz
          tar -xf buildroot-2026.02.tar.gz -C buildroot --strip-components=1
          cp buildroot_configs/ilvdistro_defconfig buildroot/configs/
          cd buildroot
          make clean
          make ilvdistro_defconfig
          make olddefconfig
          make -j$(nproc)
          cd ..
          mkdir -p configs/releng/airootfs/opt/ilvdistro/
          cp buildroot/output/images/rootfs.tar configs/releng/airootfs/opt/ilvdistro/
      - name: Verify Build Output
        run: |
          find buildroot/output/ -name rootfs.tar
      - name: Setup Profile
        run: |
          set -euo pipefail
          cd configs/releng/
          find . -name "mkinitcpio.conf" -delete
          find . -name "mkinitcpio.d" -exec rm -rf {} +

      - name: Free Disk Space
        run: |
          set -euo pipefail
          rm -rf /usr/share/dotnet || true
          rm -rf /usr/local/lib/android || true
          rm -rf /opt/ghc || true
          pacman -Scc --noconfirm
          rm -rf /var/cache/pacman/pkg/*
      - name: Build ISO
        run: |
          set -euo pipefail
          rm -rf /tmp/archiso-tmp || true
          rm -rf out/ || true
          mkdir -p out
          mount --make-rshared / 
      
      - name: AI Auto-Fix (Nếu build lỗi)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.ILV_BOT_BUILDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
         echo "Hiện đang ở thư mục: $(pwd)"
          ls -la .git
          
          set -euo pipefail
          git config --global user.name "ILV-Bot"
          git config --global user.email "bot@ilv.linux"
          # Use token for push only; do not expose it in logs.
          git remote set-url origin https://x-access-token:${{ secrets.ILV_BOT_BUILDER }}@github.com/${{ github.repository }}.git

          if [ -f /tmp/archiso-tmp/airootfs.log ]; then
            ERROR_LOG=$(tail -n 500 /tmp/archiso-tmp/airootfs.log)
          else
            ERROR_LOG="(no log found)"
          fi

          # Call the model and capture the raw suggestion safely
          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"Log lỗi build Archiso: ${ERROR_LOG//\"/\\\"}. Hãy viết 1 đoạn code shell để sửa lỗi này. Nếu không có đoạn mã, chỉ trả lời không có đề xuất.\"}]}]}") || true

          SUGGESTION=$(printf "%s" "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty') || true

          # Extract code block between ```bash and ``` (safe extraction without requiring grep -P)
          SUGGESTED_CODE=$(printf "%s\n" "$SUGGESTION" | awk 'BEGIN{found=0} /```bash/{found=1; next} /```/{if(found){found=0; exit}} found{print}') || true

          BRANCH="ai-fix-${{ github.run_id }}"

          if [ -z "$SUGGESTED_CODE" ]; then
            # No runnable fix found — create PR with the AI's raw suggestion for manual review
            git checkout -b "$BRANCH"
            echo "AI suggestion (raw):" > ai_suggestion.txt
            printf "%s\n" "$SUGGESTION" >> ai_suggestion.txt
            git add ai_suggestion.txt
            git commit -m "🤖 ILV_BOT_BUILDER: AI suggested no runnable fix for ${{ github.run_id }}"
            git push origin "$BRANCH"
            gh pr create --title "AI Suggestion: No runnable fix for ${{ github.run_id }}" --body-file ai_suggestion.txt || true
            exit 0
          fi

          # Write suggested fix to file but DO NOT execute it here. Let maintainers review and run in safe environment.
          git checkout -b "$BRANCH"
          printf "%s\n" "$SUGGESTED_CODE" > ai-suggested-fix.sh
          chmod +x ai-suggested-fix.sh || true
          git add ai-suggested-fix.sh
          git commit -m "🤖 ILV_BOT_BUILDER: Proposed fix script for build ${{ github.run_id }}"
          git push origin "$BRANCH"

          printf "AI suggested fix attached as ai-suggested-fix.sh\n\nRaw suggestion:\n\n%s\n" "$SUGGESTION" > pr-body.txt
          gh pr create --title "AI Suggestion: Fix build ${{ github.run_id }}" --body-file pr-body.txt || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ILV-Linux-ISO
          path: out/*.iso
          retention-days: 7
