name: Build ILV-Linux ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm archiso squashfs-tools dosfstools mtools base-devel reflector
          reflector --latest 10 --protocol https --sort rate --save /etc/pacman.d/mirrorlist
          pacman -Syu --noconfirm
      - name: Setup Profile
        run: |
          cd configs/releng/
          find . -name "mkinitcpio.conf" -delete
          find . -name "mkinitcpio.d" -exec rm -rf {} +
      - name: Free Disk Space
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /usr/local/lib/android
          rm -rf /opt/ghc
      - name: Build ISO
        run: |
          rm -rf /tmp/archiso-tmp ||true
          rm -rf out/ ||true
          mkdir -p out
          mkarchiso -v -w /tmp/archiso-tmp -o out/ configs/releng/
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ILV-Linux-ISO
          path: out/*.iso
          retention-days: 7
