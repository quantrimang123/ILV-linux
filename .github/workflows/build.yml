name: Build Minimal Arch ISO (Baseline + Bootstrap)
on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: >-
        --cap-add=SYS_ADMIN
        --cap-add=SYS_CHROOT
        --device=/dev/loop-control
        --device=/dev/loop0
        --volume /dev:/dev
        --volume /proc:/proc:rslave
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pacman + keyring
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm archlinux-keyring
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install dependencies
        run: |
          set -euo pipefail
          pacman -S --noconfirm archiso squashfs-tools dosfstools mtools curl jq git rsync zstd

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ hashFiles('iso/packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: Prepare baseline profile
        run: |
          set -euo pipefail
          cp -r /usr/share/archiso/configs/baseline iso
          mkdir -p iso/airootfs

      - name: Bootstrap minimal rootfs
        run: |
          set -euo pipefail
          ROOTFS=root.x86_64
          mkdir -p "$ROOTFS"
          pacstrap -c -G -M "$ROOTFS" base linux systemd bash coreutils
          rm -rf "$ROOTFS/var/cache/pacman/pkg/"*

      - name: Configure rootfs
        run: |
          set -euo pipefail
          ROOTFS=root.x86_64

          echo "ilv-linux" > "$ROOTFS/etc/hostname"

          mkdir -p "$ROOTFS/etc/systemd/system/getty.target.wants"
          ln -sf /usr/lib/systemd/system/getty@.service "$ROOTFS/etc/systemd/system/getty.target.wants/getty@tty1.service"

          arch-chroot "$ROOTFS" pacman -S --noconfirm iproute2 dhcpcd
          arch-chroot "$ROOTFS" systemctl enable dhcpcd

          echo "en_US.UTF-8 UTF-8" > "$ROOTFS/etc/locale.gen"
          arch-chroot "$ROOTFS" locale-gen

          echo "root:root" | arch-chroot "$ROOTFS" chpasswd

          rm -rf "$ROOTFS/usr/share/doc"
          rm -rf "$ROOTFS/usr/share/man"
          rm -rf "$ROOTFS/usr/share/info"
          rm -rf "$ROOTFS/usr/share/locale/"*

      - name: Copy rootfs into archiso
        run: |
          set -euo pipefail
          rsync -a root.x86_64/ iso/airootfs/

      - name: Free disk space
        run: |
          set -euo pipefail
          pacman -Scc --noconfirm || true
          rm -rf /var/cache/pacman/pkg/*

      - name: Build ISO
        run: |
          set -euo pipefail
          mkdir -p out
          mkarchiso -v -w /tmp/archiso-tmp -o out iso/

      - name: Verify output
        run: |
          ls -lh out/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: minimal-arch-iso
          path: out/*.iso
          retention-days: 7
